name: countdown
description: "Countdown events and daily habit tracker with home screen widgets."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────────────────────
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.0.0

  # ── Database ──────────────────────────────────────────────────────────────────
  drift: ^2.21.0
  drift_flutter: ^0.2.1

  # ── Monetization ──────────────────────────────────────────────────────────────
  purchases_flutter: ^9.14.0
  purchases_ui_flutter: ^9.14.0

  # ── Home Screen Widgets ───────────────────────────────────────────────────────
  home_widget: ^0.9.1

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0

  # ── Media ─────────────────────────────────────────────────────────────────────
  # image_picker: picking photos from the device library.
  # Platform setup required:
  #   iOS  → add NSPhotoLibraryUsageDescription to ios/Runner/Info.plist
  #   Android 13+ → no extra manifest entry needed (image_picker ≥ 0.8.6)
  image_picker: ^1.1.0
  path_provider: ^2.1.0   # getApplicationDocumentsDirectory() for persisting event photos

  # ── UI Utilities ──────────────────────────────────────────────────────────────
  gap: ^3.0.1
  google_fonts: ^6.2.1

  # ── Data Utilities ────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3
  intl: ^0.20.0
  uuid: ^4.5.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  drift_dev: ^2.21.0

  # ── Linting ───────────────────────────────────────────────────────────────────
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Fraunces
      fonts:
        - asset: fonts/Fraunces_72pt-Light.ttf
          weight: 300
        - asset: fonts/Fraunces_72pt-Regular.ttf
          weight: 400
        - asset: fonts/Fraunces_72pt-Bold.ttf
          weight: 700