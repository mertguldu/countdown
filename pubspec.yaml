name: countdown
description: "Countdown events and daily habit tracker with home screen widgets."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────────────────────
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.0.0

  # ── Database ──────────────────────────────────────────────────────────────────
  drift: ^2.21.0
  drift_flutter: ^0.2.1        # Handles SQLite platform setup; no manual sqlite3_flutter_libs needed

  # ── Monetization ──────────────────────────────────────────────────────────────
  purchases_flutter: ^9.14.0
  purchases_ui_flutter: ^9.14.0

  # ── Home Screen Widgets ───────────────────────────────────────────────────────
  home_widget: ^0.9.1

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0            # Required for zonedSchedule() — must match flutter_local_notifications
  flutter_timezone: ^5.1.0     # Gets the device's IANA timezone string at runtime

  # ── UI Utilities ──────────────────────────────────────────────────────────────
  gap: ^3.0.1                  # Spacing inside Row/Column (replaces SizedBox clutter)
  google_fonts: ^6.2.1         # Used for any system font beyond Fraunces

  # ── Data Utilities ────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3   # Onboarding completed flag, lightweight settings
  intl: ^0.20.0                # Date & number formatting
  uuid: ^4.5.1                 # Generates unique IDs for events
  path: ^1.9.1                 # File path construction for the Drift DB

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0   # Generates providers from @riverpod annotations
  drift_dev: ^2.21.0           # Generates Drift table & query code

  # ── Linting ───────────────────────────────────────────────────────────────────
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0        # Riverpod-aware lint rules (missing .autoDispose, etc.)

flutter:
  uses-material-design: true

  assets:
    - assets/images/           # Illustrations, onboarding graphics, category icons

  # Fraunces is used for large countdown numbers (FrauncesNumber widget).
  # Download the weights you need from fonts.google.com and place them in fonts/.
  # Recommended: 300 (Light), 400 (Regular), 700 (Bold)
  fonts:
    - family: Fraunces
      fonts:
        - asset: fonts/Fraunces_72pt-Light.ttf
          weight: 300
        - asset: fonts/Fraunces_72pt-Regular.ttf
          weight: 400
        - asset: fonts/Fraunces_72pt-Bold.ttf
          weight: 700